<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>成效趋势面 · Loom</title>
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="loom.css" />
  <link rel="stylesheet" href="efficacy.css" />
  <style>
    .eff-shell { min-height: 100vh; background: var(--paper); }
    .eff-main { padding: var(--s-8) var(--s-6) var(--s-16); }
    @media (max-width: 640px) { .eff-main { padding: var(--s-5) var(--s-4) var(--s-12); } }
  </style>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
      <rect width="64" height="64" rx="12" fill="#FAEDE5" />
      <path d="M16 42 L26 34 L34 38 L48 22" fill="none" stroke="#D97757" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
      <circle cx="48" cy="22" r="3.4" fill="#D97757" />
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="data-efficacy.jsx"></script>
  <script type="text/babel" src="eff-viz.jsx"></script>
  <script type="text/babel" src="eff-rollup.jsx"></script>
  <script type="text/babel" src="screen-efficacy.jsx"></script>

  <script type="text/babel">
    const EFF_TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "vizMode": "stream",
      "effWindow": "calendar",
      "showSource": true,
      "transferMode": "highlight",
      "selfMode": "rows",
      "effState": "ok",
      "anim": true
    }/*EDITMODE-END*/;

    function EfficacyApp() {
      const [t, setTweak] = useTweaks(EFF_TWEAK_DEFAULTS);
      React.useEffect(() => {
        document.documentElement.setAttribute("data-anim", t.anim ? "on" : "off");
      }, [t.anim]);
      const go = () => {}; // standalone review artifact — nav links are no-ops
      const ui = {
        vizMode: t.vizMode, effWindow: t.effWindow, showSource: t.showSource,
        transferMode: t.transferMode, selfMode: t.selfMode, effState: t.effState,
      };
      return (
        <div className="eff-shell" data-anim={t.anim ? "on" : "off"}>
          <main className="eff-main">
            <ScreenEfficacy go={go} ui={ui} />
          </main>
          <TweaksPanel title="Tweaks">
            <TweakSection label="数据态 demo" />
            <TweakSelect label="状态" value={t.effState} options={[
              { value: "ok", label: "ok · 正常" },
              { value: "loading", label: "loading · 加载中" },
              { value: "empty", label: "empty · 零作答(首日)" },
              { value: "single", label: "single · 全单点" },
              { value: "lowconf", label: "lowconf · 全还嫩(默认态)" },
              { value: "regress", label: "regress · 全退步" },
              { value: "error", label: "error · 取不到(不回落平线)" },
            ]} onChange={(v) => setTweak("effState", v)} />

            <TweakSection label="核心轨迹形态" />
            <TweakRadio label="可视化" value={t.vizMode} options={[
              { value: "rows", label: "折线行" }, { value: "grid", label: "小倍数" }, { value: "stream", label: "河流带" },
            ]} onChange={(v) => setTweak("vizMode", v)} />

            <TweakSection label="留白1 · 窗口 / 粒度" />
            <TweakRadio label="聚合轴" value={t.effWindow} options={[
              { value: "attempt", label: "attempt" }, { value: "calendar", label: "日历" }, { value: "week", label: "周桶" },
            ]} onChange={(v) => setTweak("effWindow", v)} />

            <TweakSection label="留白2 · 跨 KC 迁移" />
            <TweakRadio label="形态" value={t.transferMode} options={[
              { value: "highlight", label: "联动高亮" }, { value: "reserve", label: "仅预留" }, { value: "off", label: "关" },
            ]} onChange={(v) => setTweak("transferMode", v)} />

            <TweakSection label="留白3 · 来源二态" />
            <TweakToggle label="区分 真练 / 先验回声" value={t.showSource} onChange={(v) => setTweak("showSource", v)} />

            <TweakSection label="留白4 · 开放题自评" />
            <TweakRadio label="自评轨" value={t.selfMode} options={[
              { value: "rows", label: "自评行" }, { value: "off", label: "关" },
            ]} onChange={(v) => setTweak("selfMode", v)} />

            <TweakSection label="动效" />
            <TweakToggle label="入场动画" value={t.anim} onChange={(v) => setTweak("anim", v)} />
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<EfficacyApp />);
  </script>
</body>
</html>
