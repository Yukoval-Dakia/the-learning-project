<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--paper); }
  .grid { display: grid; gap: 14px; grid-template-columns: repeat(3, 1fr); }
  .col { display: flex; flex-direction: column; gap: 8px; }
  .label { font-family: var(--font-sans); font-weight: 600; font-size: 14px; color: var(--ink); display:flex; align-items:baseline; gap:8px; }
  .label .cn { font-family: var(--font-sans); }
  .key { font-family: var(--font-mono); font-size: 11px; color: var(--ink-4); }
  .demo {
    border: 1px solid; border-radius: var(--r-pill);
    padding: 8px 14px;
    font-family: var(--font-sans);
    font-size: 14px;
    text-align: center;
    line-height: 1.3;
  }
  .ramp { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; border-radius: var(--r-2); overflow: hidden; border: 1px solid rgba(60,50,30,0.08); height: 22px; }
  .ramp > div { font-family: var(--font-mono); font-size: 9.5px; color: var(--ink-4); display: flex; align-items: center; justify-content: center; }
</style>
</head>
<body>
  <div class="grid">

    <div class="col">
      <div class="label"><span class="cn">不会</span><span class="key">again</span></div>
      <div class="demo" style="background:var(--again-soft); border-color:var(--again-line); color:var(--again-ink);">不会 (1)</div>
      <div class="ramp">
        <div style="background:#F6E1D8; color:#5A1709;">soft</div>
        <div style="background:#E8B7A4; color:#5A1709;">line</div>
        <div style="background:#B5341B; color:#fff;">solid</div>
      </div>
    </div>

    <div class="col">
      <div class="label"><span class="cn">模糊</span><span class="key">hard</span></div>
      <div class="demo" style="background:var(--hard-soft); border-color:var(--hard-line); color:var(--hard-ink);">模糊 (2)</div>
      <div class="ramp">
        <div style="background:#F6ECD2; color:#4A3208;">soft</div>
        <div style="background:#E0C788; color:#4A3208;">line</div>
        <div style="background:#A87519; color:#fff;">solid</div>
      </div>
    </div>

    <div class="col">
      <div class="label"><span class="cn">会了</span><span class="key">good</span></div>
      <div class="demo" style="background:var(--good-soft); border-color:var(--good-line); color:var(--good-ink);">会了 (3)</div>
      <div class="ramp">
        <div style="background:#E2EBDF; color:#1F3625;">soft</div>
        <div style="background:#B5CDB8; color:#1F3625;">line</div>
        <div style="background:#4A7C59; color:#fff;">solid</div>
      </div>
    </div>

  </div>
</body>
</html>
