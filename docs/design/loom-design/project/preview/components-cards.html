<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--paper); display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card {
    background: var(--paper-raised);
    border: 1px solid var(--line);
    border-radius: var(--r-3);
    padding: 16px;
    box-shadow: var(--shadow-1);
    display: flex; flex-direction: column; gap: 8px;
  }
  .card-head {
    display: flex; align-items: baseline; justify-content: space-between;
  }
  .ts { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-4); }
  .badge { display:inline-flex; padding: 4px 9px; font-family: var(--font-sans); font-size: 12px; font-weight: 500; line-height: 1; border-radius: var(--r-pill); border: 1px solid transparent; }
  .b-ai { background: var(--info-soft); color: var(--info-ink); }
  .b-good { background: var(--good-soft); color: var(--good-ink); border-color: var(--good-line); }
  .prompt { font-family: var(--font-sans); font-size: 15px; color: var(--ink); line-height: 1.6; font-weight: 500; }
  .wrong { font-family: var(--font-sans); font-size: 14px; color: var(--ink-2); line-height: 1.5; }
  .wrong .l { color: var(--ink-4); font-size: 12px; }
  .meta { font-family: var(--font-sans); font-size: 12.5px; color: var(--ink-4); line-height: 1.4; letter-spacing: 0; text-transform: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="card-head">
      <span class="ts">2026-05-09 14:22</span>
      <span class="badge b-ai">AI · concept (87%)</span>
    </div>
    <div class="prompt">"之"在「古之学者」中的用法?</div>
    <div class="wrong"><span class="l">错答:</span> 主谓之间，取消句子独立性</div>
    <div class="meta">知识点: 文言虚词 · 之</div>
  </div>

  <div class="card">
    <div class="card-head">
      <span class="badge b-good">已完成</span>
      <span class="ts">×</span>
    </div>
    <div class="prompt">学好之乎者也</div>
    <div class="meta">完成于 2026-05-08 · 知识点: 文言虚词</div>
  </div>
</body>
</html>
