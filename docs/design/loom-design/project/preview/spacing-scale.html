<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 8px; }
  .row { display: grid; grid-template-columns: 80px 1fr 90px; align-items: center; gap: 14px; }
  .name { font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); }
  .bar { height: 18px; background: var(--coral-soft); border: 1px solid var(--coral-line); border-radius: var(--r-1); }
  .px { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-4); text-align: right; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="name">--s-1</div><div><div class="bar" style="width:4px"></div></div><div class="px">4 px</div></div>
    <div class="row"><div class="name">--s-2</div><div><div class="bar" style="width:8px"></div></div><div class="px">8 px</div></div>
    <div class="row"><div class="name">--s-3</div><div><div class="bar" style="width:12px"></div></div><div class="px">12 px</div></div>
    <div class="row"><div class="name">--s-4</div><div><div class="bar" style="width:16px"></div></div><div class="px">16 px</div></div>
    <div class="row"><div class="name">--s-5</div><div><div class="bar" style="width:20px"></div></div><div class="px">20 px</div></div>
    <div class="row"><div class="name">--s-6</div><div><div class="bar" style="width:24px"></div></div><div class="px">24 px</div></div>
    <div class="row"><div class="name">--s-8</div><div><div class="bar" style="width:32px"></div></div><div class="px">32 px</div></div>
    <div class="row"><div class="name">--s-10</div><div><div class="bar" style="width:40px"></div></div><div class="px">40 px</div></div>
    <div class="row"><div class="name">--s-12</div><div><div class="bar" style="width:48px"></div></div><div class="px">48 px</div></div>
    <div class="row"><div class="name">--s-16</div><div><div class="bar" style="width:64px"></div></div><div class="px">64 px</div></div>
    <div class="row"><div class="name">--s-20</div><div><div class="bar" style="width:80px"></div></div><div class="px">80 px</div></div>
  </div>
</body>
</html>
