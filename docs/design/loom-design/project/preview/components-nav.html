<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 0; background: var(--paper); }
  .nav {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 16px;
    background: var(--paper-raised);
    border-bottom: 1px solid var(--line);
  }
  .brand { display: flex; align-items: center; gap: 8px; padding-right: 14px; margin-right: 6px; border-right: 1px solid var(--line); }
  .brand svg { width: 22px; height: 22px; color: var(--coral); }
  .brand b { font-family: var(--font-serif); font-size: 17px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
  .item {
    font-family: var(--font-sans);
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink-3);
    padding: 6px 10px;
    border-radius: var(--r-2);
    text-decoration: none;
    line-height: 1;
  }
  .item.active { background: var(--paper-tint); color: var(--ink); }
  .item:hover { color: var(--ink); }
  .right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
  .meta { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-4); }

  /* mobile bottom bar */
  .mobile {
    margin-top: 18px;
    display: grid; grid-template-columns: repeat(5, 1fr);
    background: rgba(250, 249, 245, 0.85);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--line);
    padding: 8px 4px;
  }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 4px; text-decoration: none; }
  .tab svg { width: 20px; height: 20px; color: var(--ink-4); stroke-width: 1.75; }
  .tab span { font-family: var(--font-sans); font-size: 11.5px; color: var(--ink-4); }
  .tab.active svg, .tab.active span { color: var(--coral); }
</style>
</head>
<body>
  <div class="nav">
    <div class="brand">
      <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="10" y="10" width="44" height="44" rx="4" stroke-opacity="0.35"/><path d="M10 22 C 22 22, 22 30, 32 30 S 42 22, 54 22"/><path d="M10 32 C 22 32, 22 40, 32 40 S 42 32, 54 32" stroke-opacity="0.7"/><path d="M10 42 C 22 42, 22 50, 32 50 S 42 42, 54 42" stroke-opacity="0.45"/></svg>
      <b>Loom</b>
    </div>
    <a class="item" href="#">/record</a>
    <a class="item active" href="#">/review</a>
    <a class="item" href="#">/mistakes</a>
    <a class="item" href="#">/learning-items</a>
    <a class="item" href="#">/knowledge</a>
    <a class="item" href="#">/ingest</a>
    <span class="right">
      <span class="meta">phase 1a · sub 4a</span>
    </span>
  </div>

  <div class="mobile">
    <a class="tab" href="#"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.376 3.622a1 1 0 0 1 3.002 3.002L7.368 18.635a2 2 0 0 1-.855.506l-2.872.838a.5.5 0 0 1-.62-.62l.838-2.872a2 2 0 0 1 .506-.855z"/></svg><span>录入</span></a>
    <a class="tab active" href="#"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m2 9 3-3 3 3"/><path d="M13 18H7a2 2 0 0 1-2-2V6"/><path d="m22 15-3 3-3-3"/><path d="M11 6h6a2 2 0 0 1 2 2v10"/></svg><span>复习</span></a>
    <a class="tab" href="#"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m3 17 2 2 4-4"/><path d="m3 7 2 2 4-4"/><path d="M13 6h8"/><path d="M13 12h8"/><path d="M13 18h8"/></svg><span>错题</span></a>
    <a class="tab" href="#"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg><span>学习项</span></a>
    <a class="tab" href="#"><svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="16" y="16" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"/><path d="M12 12V8"/></svg><span>知识</span></a>
  </div>
</body>
</html>
