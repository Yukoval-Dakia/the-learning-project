<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr 220px; gap: 16px; align-items: baseline; padding: 12px 0; border-bottom: 1px dashed var(--line); }
  .row:last-child { border-bottom: 0; }
  .specimen { font-family: var(--font-mono); font-size: 14px; color: var(--ink); line-height: 1.45; }
  .info { display: flex; flex-direction: column; gap: 2px; text-align: right; }
  .name { font-family: var(--font-sans); font-size: 13px; color: var(--ink-3); }
  .stack-tag { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-4); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <div class="specimen">const fsrs = new FSRS({ retention: 0.9 });</div>
      <div class="info"><span class="name">JetBrains Mono</span><span class="stack-tag">code · 14 / 1.45</span></div>
    </div>
    <div class="row">
      <div class="specimen">/api/review/submit · 200 · 142ms</div>
      <div class="info"><span class="name">log line</span><span class="stack-tag">mono · ink</span></div>
    </div>
    <div class="row">
      <div class="specimen" style="color: var(--ink-4)">cause: knowledge_gap (87%)</div>
      <div class="info"><span class="name">muted token</span><span class="stack-tag">mono · ink-4</span></div>
    </div>
    <div class="row">
      <div class="specimen" style="background: var(--paper-sunk); padding: 6px 8px; border-radius: var(--r-1); border: 1px solid var(--line-soft); display: inline-block;">npm run dev</div>
      <div class="info"><span class="name">inline code</span><span class="stack-tag">on paper-sunk</span></div>
    </div>
  </div>
</body>
</html>
