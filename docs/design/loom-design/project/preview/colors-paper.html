<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--line); border-radius: var(--r-3); overflow: hidden; background: var(--paper-raised); }
  .row { display: grid; grid-template-columns: 56px 1fr 120px; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--line-soft); }
  .row:last-child { border-bottom: 0; }
  .chip { width: 40px; height: 40px; border-radius: var(--r-2); border: 1px solid rgba(60,50,30,0.08); }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 14px; color: var(--ink); }
  .desc { font-size: 13px; color: var(--ink-3); line-height: 1.4; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ink-4); text-align: right; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row">
      <div class="chip" style="background:#FAF9F5"></div>
      <div><div class="name">--paper</div><div class="desc">page background</div></div>
      <div class="hex">#FAF9F5</div>
    </div>
    <div class="row">
      <div class="chip" style="background:#FFFFFF; border-color:var(--line)"></div>
      <div><div class="name">--paper-raised</div><div class="desc">cards, popovers</div></div>
      <div class="hex">#FFFFFF</div>
    </div>
    <div class="row">
      <div class="chip" style="background:#F5F1E8"></div>
      <div><div class="name">--paper-sunk</div><div class="desc">code blocks, recessed fills</div></div>
      <div class="hex">#F5F1E8</div>
    </div>
    <div class="row">
      <div class="chip" style="background:#F2EDE0"></div>
      <div><div class="name">--paper-tint</div><div class="desc">subtle highlight stripe</div></div>
      <div class="hex">#F2EDE0</div>
    </div>
  </div>
</body>
</html>
