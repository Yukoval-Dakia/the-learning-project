<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--paper); }
  .frame { background: var(--paper-raised); border: 1px solid var(--line); border-radius: var(--r-3); padding: 22px 26px; max-width: 560px; }
  .breadcrumb { font-family: var(--font-mono); font-size: 11.5px; color: var(--ink-4); margin-bottom: 8px; letter-spacing: 0.03em; }
  h1 { font-family: var(--font-serif); font-size: 28px; font-weight: 500; color: var(--ink); margin: 0 0 4px; line-height: 1.2; letter-spacing: -0.015em; }
  .lede { font-family: var(--font-sans); font-size: 14.5px; color: var(--ink-3); margin: 0 0 18px; line-height: 1.5; }
  .lede a { color: var(--coral); text-decoration: underline; text-decoration-color: var(--coral-line); text-underline-offset: 2px; }
  .passage { font-family: var(--font-wenyan); font-size: 17px; line-height: 1.85; color: var(--ink); border-left: 2px solid var(--coral-line); padding-left: 14px; letter-spacing: 0.01em; }
  .meta { font-family: var(--font-sans); font-size: 12.5px; color: var(--ink-4); margin-top: 14px; line-height: 1.4; }
</style>
</head>
<body>
  <div class="frame">
    <div class="breadcrumb">/review · 1 / 7</div>
    <h1>「之」在主谓之间</h1>
    <p class="lede">出自《师说》。键盘 <a href="#">1 / 2 / 3</a> 评分。</p>
    <div class="passage">古之学者必有师。师者，所以传道受业解惑也。</div>
    <p class="meta">知识点 · 文言虚词 · 之 &nbsp;·&nbsp; 错因 · concept (87%)</p>
  </div>
</body>
</html>
