<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--line); border-radius: var(--r-3); overflow: hidden; background: var(--paper-raised); }
  .row { display: grid; grid-template-columns: 56px 1fr 120px; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid var(--line-soft); }
  .row:last-child { border-bottom: 0; }
  .chip { width: 40px; height: 40px; border-radius: var(--r-2); border: 1px solid rgba(60,50,30,0.08); }
  .name { font-family: var(--font-sans); font-weight: 600; font-size: 14px; color: var(--ink); }
  .desc { font-size: 13px; color: var(--ink-3); line-height: 1.4; }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ink-4); text-align: right; }
</style>
</head>
<body>
  <div class="stack">
    <div class="row"><div class="chip" style="background:#1F1E1D"></div><div><div class="name">--ink</div><div class="desc">primary text · fg-1</div></div><div class="hex">#1F1E1D</div></div>
    <div class="row"><div class="chip" style="background:#3D3B36"></div><div><div class="name">--ink-2</div><div class="desc">headings on paper · fg-2</div></div><div class="hex">#3D3B36</div></div>
    <div class="row"><div class="chip" style="background:#5C5B57"></div><div><div class="name">--ink-3</div><div class="desc">secondary copy · fg-3</div></div><div class="hex">#5C5B57</div></div>
    <div class="row"><div class="chip" style="background:#8A8880"></div><div><div class="name">--ink-4</div><div class="desc">meta, captions · fg-4</div></div><div class="hex">#8A8880</div></div>
    <div class="row"><div class="chip" style="background:#B6B3A8"></div><div><div class="name">--ink-5</div><div class="desc">disabled, hairlines · fg-5</div></div><div class="hex">#B6B3A8</div></div>
  </div>
</body>
</html>
