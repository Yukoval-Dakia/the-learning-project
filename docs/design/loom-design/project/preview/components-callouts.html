<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--r-2); }
  .row.tint { background: var(--coral-soft); }
  .row.warn { background: var(--again-soft); }
  .row.muted { background: var(--paper-sunk); }
  .text { font-family: var(--font-sans); font-size: 14px; color: var(--ink-2); line-height: 1.5; flex: 1; }
  .text b { color: var(--coral-ink); }
  .row.warn .text b { color: var(--again-ink); }
  svg { flex-shrink: 0; width: 18px; height: 18px; stroke-width: 1.75; }
  .row.tint svg { color: var(--coral); }
  .row.warn svg { color: var(--again); }
  .row.muted svg { color: var(--ink-3); }
</style>
</head>
<body>
  <div class="stack">
    <div class="row tint">
      <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <div class="text">归因失败 — <b>AttributionTask</b> 后台重试中，不阻塞录入。</div>
    </div>
    <div class="row warn">
      <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
      <div class="text"><b>API key 未配置。</b> 请将 <code>ANTHROPIC_API_KEY</code> 写入 <code>workers/.dev.vars</code>。</div>
    </div>
    <div class="row muted">
      <svg fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
      <div class="text">下次到期 · 2026-05-12 09:00 · 共 3 条</div>
    </div>
  </div>
</body>
</html>
