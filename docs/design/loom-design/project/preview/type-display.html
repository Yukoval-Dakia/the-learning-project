<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--paper); }
  .stack { display: flex; flex-direction: column; gap: 18px; }
  .item { display: flex; align-items: baseline; justify-content: space-between; gap: 16px; border-bottom: 1px dashed var(--line); padding-bottom: 14px; }
  .item:last-child { border-bottom: 0; padding-bottom: 0; }
  .specimen {
    flex: 1;
    color: var(--ink);
  }
  .key {
    flex-shrink: 0;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--ink-4);
    text-align: right;
    white-space: nowrap;
  }
  .h1 { font-family: var(--font-serif); font-size: 36px; line-height: 1.15; letter-spacing: -0.015em; font-weight: 500; }
  .h2 { font-family: var(--font-serif); font-size: 28px; line-height: 1.2;  letter-spacing: -0.015em; font-weight: 500; }
  .h3 { font-family: var(--font-sans);  font-size: 22px; line-height: 1.3; font-weight: 600; }
  .h4 { font-family: var(--font-sans);  font-size: 19px; line-height: 1.35; font-weight: 600; color: var(--ink-2); }
</style>
</head>
<body>
  <div class="stack">
    <div class="item">
      <div class="specimen h1">织三股线 · 成一闭环</div>
      <div class="key">h1 · serif 36/1.15</div>
    </div>
    <div class="item">
      <div class="specimen h2">今日的复习</div>
      <div class="key">h2 · serif 28/1.2</div>
    </div>
    <div class="item">
      <div class="specimen h3">「之」在主谓之间</div>
      <div class="key">h3 · sans 22/1.3 · 600</div>
    </div>
    <div class="item">
      <div class="specimen h4">归因中 · 已归因 17 / 20</div>
      <div class="key">h4 · sans 19/1.35 · 600</div>
    </div>
  </div>
</body>
</html>
