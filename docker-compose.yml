services:
  # YUK-65: init container that applies drizzle migrations before app + worker
  # start. Uses the same runner image as app/worker (migrate.cjs is bundled
  # by `pnpm build:migrate`; drizzle/ folder is copied into the runner image).
  # Idempotent — drizzle's __drizzle_migrations table tracks applied state.
  migrate:
    image: the-learning-project-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/migrate.cjs"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: the-learning-project-app
    env_file:
      - .env
    # M5-T5c (YUK-321): presence 走 PgPresenceStore（PG 表），不再依赖 Redis。
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped
    # YUK-137 [M2]: pure LIVENESS probe against the unauthenticated /api/health
    # route (server/app.ts, token 豁免). The runner image is node:24-slim with
    # no curl/wget guaranteed, so probe with node's built-in fetch.
    # success = ANY HTTP response (the Hono server is up), NOT r.ok —
    # /api/health intentionally returns 503 when Postgres is unreachable.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/api/health').then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    # Same image as `app` — esbuild bundles scripts/worker.ts to dist/worker.cjs.
    # Runs pg-boss queues + crons:
    #   - knowledge_propose_nightly (cron BJT 02:00)
    #   - knowledge_edge_propose_nightly (cron BJT 02:30)
    #   - prune_orphan_review_sessions (cron BJT 04:15)
    #   - session_summary (event-triggered from /api/review/sessions/[id]/end)
    #   - tencent_ocr_extract (event-triggered from ingestion)
    #   - echo (golden E2E queue)
    image: the-learning-project-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "dist/worker.cjs"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped
    # YUK-137 [M2]: the worker has no HTTP surface, so probe process liveness —
    # confirm PID 1 is still the worker.cjs node process (Docker restarts the
    # container if the entrypoint dies, but a wedged/zombie node would otherwise
    # look "up"). Reads /proc/1/cmdline via node so we need no extra tooling in
    # the slim image.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const c=require('node:fs').readFileSync('/proc/1/cmdline','utf8');process.exit(c.includes('worker.cjs')?0:1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    # YUK-137 [M2]: pin the floating `pg16` tag to an immutable digest-stable
    # tag so a surprise pg17 bump can't break the on-disk pgdata format on a
    # pull. Bump deliberately + test migrations before changing.
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loom}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loom} -d ${POSTGRES_DB:-loom}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cloudflared:
    # YUK-137 [M2]: pin the mutable `latest` tag to a known-good release so an
    # ingress restart can't silently pull a regressed tunnel build. Bump
    # deliberately.
    image: cloudflare/cloudflared:2026.5.2
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
