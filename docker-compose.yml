services:
  # YUK-65: init container that applies drizzle migrations before app + worker
  # start. Uses the same runner image as app/worker (migrate.cjs is bundled
  # by `pnpm build:migrate`; drizzle/ folder is copied into the runner image).
  # Idempotent — drizzle's __drizzle_migrations table tracks applied state.
  migrate:
    image: the-learning-project-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "migrate.cjs"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: the-learning-project-app
    env_file:
      - .env
    # YUK-148: cross-process editing presence. app (heartbeats) + worker
    # (note-refine idle checks) share this Redis so the worker doesn't apply an
    # AI patch mid-edit. Overrides any REDIS_URL in .env so both services agree.
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped
    # YUK-137 [M2]: pure LIVENESS probe against the unauthenticated /api/health
    # route (see middleware.ts — /api/health is exempt from the internal-token
    # gate). The runner image is node:24-bookworm-slim with no curl/wget
    # guaranteed, so probe with node's built-in fetch. start_period covers
    # Next.js cold start. NOTE: success = ANY HTTP response (the Next server is
    # up), NOT r.ok — /api/health intentionally returns 503 when Postgres is
    # unreachable, but DB readiness is the postgres container's own healthcheck;
    # coupling the app's liveness to DB would mark a perfectly-alive app
    # unhealthy whenever the DB blips.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(()=>process.exit(0)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    # Same image as `app` — esbuild bundles scripts/worker.ts to worker.cjs
    # alongside the Next standalone server.js (see Dockerfile + pnpm
    # build:worker). Runs pg-boss queues + crons:
    #   - knowledge_propose_nightly (cron BJT 02:00)
    #   - knowledge_edge_propose_nightly (cron BJT 02:30)
    #   - prune_orphan_review_sessions (cron BJT 04:15)
    #   - session_summary (event-triggered from /api/review/sessions/[id]/end)
    #   - tencent_ocr_extract (event-triggered from ingestion)
    #   - echo (golden E2E queue)
    image: the-learning-project-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "worker.cjs"]
    env_file:
      - .env
    # YUK-148: same Redis as `app` so editing presence is shared across the two
    # processes (see app service note).
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped
    # YUK-137 [M2]: the worker has no HTTP surface, so probe process liveness —
    # confirm PID 1 is still the worker.cjs node process (Docker restarts the
    # container if the entrypoint dies, but a wedged/zombie node would otherwise
    # look "up"). Reads /proc/1/cmdline via node so we need no extra tooling in
    # the slim image.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const c=require('node:fs').readFileSync('/proc/1/cmdline','utf8');process.exit(c.includes('worker.cjs')?0:1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    # YUK-148: shared editing-presence store for app + worker. Presence is
    # ephemeral best-effort state — lost presence on restart safely reads as
    # idle — so no persistence (AOF/RDB) and no volume are configured. Keys
    # self-expire via a TTL aligned to the heartbeat timeout (see ADR-0023).
    image: redis:7-alpine
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    # YUK-137 [M2]: pin the floating `pg16` tag to an immutable digest-stable
    # tag so a surprise pg17 bump can't break the on-disk pgdata format on a
    # pull. Bump deliberately + test migrations before changing.
    image: pgvector/pgvector:0.8.2-pg16-bookworm
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loom}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loom} -d ${POSTGRES_DB:-loom}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cloudflared:
    # YUK-137 [M2]: pin the mutable `latest` tag to a known-good release so an
    # ingress restart can't silently pull a regressed tunnel build. Bump
    # deliberately.
    image: cloudflare/cloudflared:2026.5.2
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
