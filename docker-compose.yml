services:
  # YUK-65: init container that applies drizzle migrations before app + worker
  # start. Uses the same runner image as app/worker (migrate.cjs is bundled
  # by `pnpm build:migrate`; drizzle/ folder is copied into the runner image).
  # Idempotent — drizzle's __drizzle_migrations table tracks applied state.
  migrate:
    image: the-learning-project-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "migrate.cjs"]
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: the-learning-project-app
    env_file:
      - .env
    # YUK-148: cross-process editing presence. app (heartbeats) + worker
    # (note-refine idle checks) share this Redis so the worker doesn't apply an
    # AI patch mid-edit. Overrides any REDIS_URL in .env so both services agree.
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped

  worker:
    # Same image as `app` — esbuild bundles scripts/worker.ts to worker.cjs
    # alongside the Next standalone server.js (see Dockerfile + pnpm
    # build:worker). Runs pg-boss queues + crons:
    #   - knowledge_propose_nightly (cron BJT 02:00)
    #   - knowledge_edge_propose_nightly (cron BJT 02:30)
    #   - prune_orphan_review_sessions (cron BJT 04:15)
    #   - session_summary (event-triggered from /api/review/sessions/[id]/end)
    #   - tencent_ocr_extract (event-triggered from ingestion)
    #   - echo (golden E2E queue)
    image: the-learning-project-app
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "worker.cjs"]
    env_file:
      - .env
    # YUK-148: same Redis as `app` so editing presence is shared across the two
    # processes (see app service note).
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
    restart: unless-stopped

  redis:
    # YUK-148: shared editing-presence store for app + worker. Presence is
    # ephemeral best-effort state — lost presence on restart safely reads as
    # idle — so no persistence (AOF/RDB) and no volume are configured. Keys
    # self-expire via a TTL aligned to the heartbeat timeout (see ADR-0023).
    image: redis:7-alpine
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-loom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-loom}
      POSTGRES_DB: ${POSTGRES_DB:-loom}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-loom} -d ${POSTGRES_DB:-loom}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    depends_on:
      - app
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
