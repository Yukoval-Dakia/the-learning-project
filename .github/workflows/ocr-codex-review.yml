name: OCR PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: read

concurrency:
  # Separate close-collection runs from review runs so merging a PR never
  # cancels an in-flight review of the same PR (and vice versa).
  group: ocr-codex-review-${{ github.event.pull_request.number }}-${{ github.event.action == 'closed' && 'close' || 'review' }}
  cancel-in-progress: true

jobs:
  review:
    name: OCR review
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: [self-hosted, ocr-codex-review]
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      OCR_BIN: ${{ vars.OCR_BIN }}
      OCR_CONCURRENCY: ${{ vars.OCR_CONCURRENCY }}
      OCR_MAX_TOOLS: ${{ vars.OCR_MAX_TOOLS }}
      OCR_TIMEOUT_MINUTES: ${{ vars.OCR_TIMEOUT_MINUTES }}
    steps:
      - name: Checkout pull request merge
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve OCR binary
        id: ocr_bin
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${OCR_BIN:-}" ]; then
            if [ -x "$OCR_BIN" ] || command -v "$OCR_BIN" >/dev/null 2>&1; then
              printf 'path=%s\n' "$OCR_BIN" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "OCR_BIN is set but is not executable and is not on PATH: $OCR_BIN" >&2
            exit 1
          fi

          if command -v ocr >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v ocr)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if command -v opencodereview >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v opencodereview)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "OpenCodeReview CLI was not found. Install it on the self-hosted runner or set repository variable OCR_BIN." >&2
          exit 1

      - name: Fetch pull request refs
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"

          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "refs/remotes/pull/${PR_NUMBER}/head^{commit}"

      - name: Collect prior-comment feedback (learnings)
        if: ${{ vars.OCR_LEARNINGS != 'off' }}
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(process.env.PR_NUMBER);
            const DISAGREE = /\b(no|wrong|disagree|incorrect|not (right|true)|nah|invalid)\b/i;
            const STALE_DAYS = 7;
            const now = Date.now();

            try {
              // Page through this PR's review threads via GraphQL (isResolved lives here).
              // Each thread's first page of comments is fetched inline (first:100).
              // Fix 1 — comment pagination: if a thread is an OCR thread AND its first
              // comment page has hasNextPage, we fetch additional pages via a dedicated
              // query keyed by the thread's databaseId. This avoids over-fetching on the
              // common case (most threads have <100 comments) while ensuring we see every
              // human reply before computing the verdict.
              const query = `query($owner:String!,$repo:String!,$pr:Int!,$cursor:String){
                repository(owner:$owner,name:$repo){
                  pullRequest(number:$pr){
                    reviewThreads(first:50, after:$cursor){
                      pageInfo{ hasNextPage endCursor }
                      nodes{
                        isResolved
                        id
                        comments(first:100){
                          pageInfo{ hasNextPage endCursor }
                          nodes{
                            id body path createdAt
                            author{ login __typename }
                          }
                        }
                      }
                    }
                  }
                }
              }`;

              // Follow-up query to fetch remaining comment pages for a single thread.
              const commentsQuery = `query($threadId:ID!,$commentsCursor:String){
                node(id:$threadId){
                  ... on PullRequestReviewThread{
                    comments(first:100, after:$commentsCursor){
                      pageInfo{ hasNextPage endCursor }
                      nodes{
                        id body path createdAt
                        author{ login __typename }
                      }
                    }
                  }
                }
              }`;

              const out = [];
              let cursor = null;
              do {
                const data = await github.graphql(query, {
                  owner: context.repo.owner, repo: context.repo.repo, pr: prNumber, cursor,
                });
                const threads = data.repository.pullRequest.reviewThreads;
                for (const th of threads.nodes) {
                  const firstPage = th.comments;
                  const cs = firstPage.nodes;
                  if (cs.length === 0) continue;
                  // The first comment in a thread is the original review comment.
                  const head = cs[0];
                  // Fix 2 — verify the OCR comment's author is a Bot, not just body prefix.
                  // A human comment starting with '**OCR**' would otherwise be misclassified.
                  const isOCR = head.body && head.body.startsWith('**OCR**') &&
                    head.author && head.author.__typename === 'Bot';
                  if (!isOCR) continue;

                  // Collect all comment nodes; add more pages if needed (Fix 1).
                  let allComments = cs.slice();
                  let commentsCursor = firstPage.pageInfo.hasNextPage ? firstPage.pageInfo.endCursor : null;
                  while (commentsCursor) {
                    const moreData = await github.graphql(commentsQuery, {
                      threadId: th.id, commentsCursor,
                    });
                    const morePage = moreData?.node?.comments;
                    if (!morePage) break;
                    allComments = allComments.concat(morePage.nodes);
                    commentsCursor = morePage.pageInfo.hasNextPage ? morePage.pageInfo.endCursor : null;
                  }

                  let verdict = null;
                  if (th.isResolved) {
                    verdict = 'accepted';
                  } else {
                    // Any human reply expressing disagreement => rejected.
                    const humanDisagree = allComments.slice(1).some(c =>
                      c.author && c.author.__typename === 'User' && DISAGREE.test(c.body || ''));
                    if (humanDisagree) {
                      verdict = 'rejected';
                    } else {
                      const ageDays = (now - Date.parse(head.createdAt)) / 86400000;
                      if (ageDays > STALE_DAYS) verdict = 'rejected';
                    }
                  }
                  if (!verdict) continue; // ambiguous -> skip

                  out.push({
                    comment_id: head.id,
                    body: head.body,
                    path: head.path ?? null, // Fix 3 — null (not '') for missing path
                    verdict,
                  });
                }
                cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
              } while (cursor);

              const path = `${process.env.RUNNER_TEMP || '.'}/ocr-feedback.json`;
              fs.writeFileSync(path, JSON.stringify(out));
              core.exportVariable('OCR_LEARNINGS_FEEDBACK', path);
              core.info(`OCR learnings: wrote ${out.length} verdicted feedback item(s) to ${path}`);
            } catch (err) {
              core.warning(`OCR learnings: feedback collection failed (review continues): ${err && err.message ? err.message : err}`);
            }

      - name: Run OCR review
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          OCR_CONCURRENCY="${OCR_CONCURRENCY:-1}"
          OCR_MAX_TOOLS="${OCR_MAX_TOOLS:-6}"
          OCR_TIMEOUT_MINUTES="${OCR_TIMEOUT_MINUTES:-20}"

          "${{ steps.ocr_bin.outputs.path }}" review \
            --repo "$GITHUB_WORKSPACE" \
            --from "$BASE_SHA" \
            --to "refs/remotes/pull/${PR_NUMBER}/head" \
            --audience agent \
            --format json \
            --concurrency "$OCR_CONCURRENCY" \
            --max-tools "$OCR_MAX_TOOLS" \
            --timeout "$OCR_TIMEOUT_MINUTES" \
            > ocr-review.json

          test -s ocr-review.json

      # Diagnostic artifact only — a transient ECONNRESET from the self-hosted
      # runner to GitHub's artifact endpoint must NOT fail a review that already
      # ran and posted comments. Best-effort with retries.
      - name: Upload OCR review JSON
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: ocr-codex-review-${{ github.event.pull_request.number }}
          path: ocr-review.json
          if-no-files-found: error
          retention-days: 7

      - name: Upsert PR review comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            // Per-run marker (run id embedded) — each review round posts a NEW
            // comment so rounds stay traceable on the PR timeline (owner decision
            // 2026-06-06; the old stable marker caused in-place upserts that erased
            // earlier rounds). The artifact remains the per-run machine record.
            const marker = `<!-- ocr-codex-review run=${context.runId} -->`;
            const raw = fs.readFileSync('ocr-review.json', 'utf8');
            const result = JSON.parse(raw);
            const summary = result.summary || {};
            const comments = Array.isArray(result.comments) ? result.comments : [];

            const fenced = (value) => {
              const text = String(value || '').trim();
              if (!text) return '';
              return `\n\`\`\`\n${text.replaceAll('```', '`\\`\\`')}\n\`\`\``;
            };

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const commit_id = context.payload.pull_request.head.sha;

            // Retry transient GitHub API failures (5xx / 429 / network). A 4xx
            // (e.g. 422 "line not in diff") is a real client error — fail fast so
            // the caller can fall back. Returns the API response.
            const sleep = (ms) => new Promise((r) => setTimeout(r, ms));
            const withRetry = async (label, fn) => {
              for (let attempt = 1; ; attempt++) {
                try {
                  return await fn();
                } catch (err) {
                  const status = err && err.status;
                  const transient = !status || status >= 500 || status === 429;
                  if (!transient || attempt >= 4) throw err;
                  const delay = 2000 * attempt;
                  core.warning(`${label} attempt ${attempt} failed (status ${status ?? 'network'}): ${err.message}; retrying in ${delay}ms`);
                  await sleep(delay);
                }
              }
            };

            // Body for a single finding (used both inline and in the fallback summary).
            const commentBody = (comment) => {
              const sev = comment.severity ? ` \`${comment.severity}\`` : '';
              const conf = (typeof comment.confidence === 'number') ? ` (confidence ${comment.confidence.toFixed(2)})` : '';
              const out = [`**OCR**${sev}${conf}`, '', String(comment.content || '').trim()];
              if (comment.suggestion_code) {
                out.push('', 'Suggested replacement:', fenced(comment.suggestion_code));
              }
              return out.join('\n');
            };

            // An inline review comment anchors on a line that must fall inside the
            // PR diff. Use end_line as the anchor; for a multi-line span, set
            // start_line too (GitHub requires start_line < line).
            const inlineComment = (comment) => {
              const line = comment.end_line || comment.start_line;
              if (!comment.path || !line) return null; // not anchorable
              const c = { path: comment.path, line, side: 'RIGHT', body: commentBody(comment) };
              if (comment.start_line && comment.start_line < line) {
                c.start_line = comment.start_line;
                c.start_side = 'RIGHT';
              }
              return c;
            };

            const headerLines = [
              marker,
              '## OCR review',
              '',
              `Reviewed commit: \`${(commit_id || '').slice(0, 8)}\``,
              `Status: \`${result.status || 'unknown'}\``,
              `Files reviewed: \`${summary.files_reviewed ?? 0}\``,
              `Comments: \`${summary.comments ?? comments.length}\``,
              `Elapsed: \`${summary.elapsed || 'n/a'}\``,
            ];

            if (comments.length === 0) {
              await withRetry('createReview(summary)', () => github.rest.pulls.createReview({
                owner, repo, pull_number: issue_number, commit_id, event: 'COMMENT',
                body: [...headerLines, '', 'No actionable comments found.'].join('\n'),
              }));
              return;
            }

            // Render a finding into the fallback summary (for comments whose line
            // GitHub rejects as outside the diff).
            const summaryEntry = (comment, idx) => {
              const location = [
                comment.path || 'unknown',
                comment.start_line ? `:${comment.start_line}` : '',
                comment.end_line && comment.end_line !== comment.start_line ? `-${comment.end_line}` : '',
              ].join('');
              const parts = [`### ${idx}. \`${location}\``, '', commentBody(comment)];
              if (comment.existing_code) {
                parts.push('', 'Existing code:', fenced(comment.existing_code));
              }
              return parts.join('\n');
            };

            const anchored = [];
            const unanchored = [];
            comments.forEach((c, i) => {
              const ic = inlineComment(c);
              if (ic) anchored.push(ic); else unanchored.push(summaryEntry(c, i + 1));
            });

            // Attempt one review with all inline comments. GitHub rejects the
            // WHOLE review (422) if any one line is outside the diff, so on 422
            // fall back to posting each inline comment individually and collect
            // the ones that still fail into the summary body.
            let posted = 0;
            let inlineFailed = [];
            if (anchored.length > 0) {
              try {
                await withRetry('createReview(inline)', () => github.rest.pulls.createReview({
                  owner, repo, pull_number: issue_number, commit_id, event: 'COMMENT',
                  body: headerLines.join('\n'),
                  comments: anchored,
                }));
                posted = anchored.length;
              } catch (err) {
                if (err && err.status === 422) {
                  core.warning(`Batch inline review rejected (422); retrying comments individually: ${err.message}`);
                  for (const ic of anchored) {
                    try {
                      await withRetry('createReviewComment', () => github.rest.pulls.createReviewComment({
                        owner, repo, pull_number: issue_number, commit_id,
                        path: ic.path, line: ic.line, side: ic.side,
                        ...(ic.start_line ? { start_line: ic.start_line, start_side: ic.start_side } : {}),
                        body: ic.body,
                      }));
                      posted++;
                    } catch (e2) {
                      if (e2 && e2.status === 422) {
                        inlineFailed.push(`### \`${ic.path}:${ic.line}\` (could not anchor to diff)\n\n${ic.body}`);
                      } else { throw e2; }
                    }
                  }
                } else { throw err; }
              }
            }

            // Post a summary comment if there is anything that could not be inlined,
            // or if there were zero anchorable comments to begin with.
            const overflow = [...unanchored, ...inlineFailed];
            if (overflow.length > 0 || anchored.length === 0) {
              const summaryBody = [
                ...headerLines,
                '',
                anchored.length > 0 ? `${posted} comment(s) posted inline. The following could not be anchored to the diff:` : 'Comments (could not be anchored to the diff):',
                '',
                ...overflow,
              ].join('\n');
              await withRetry('createComment(summary)', () => github.rest.issues.createComment({
                owner, repo, issue_number, body: summaryBody,
              }));
            }

  # When a PR is MERGED, capture the final verdict of OCR's inline comments and
  # ingest them into the learnings store — WITHOUT running an LLM review. This is
  # the reliable capture point: the review-time collector misses verdicts that
  # only settle after the last review (e.g. fix-commit, then resolve, then merge
  # with no further review trigger). Conservative rules avoid noisy "rejected":
  #   resolved -> accepted; unresolved + human disagree reply -> rejected; else skip.
  collect-on-merge:
    name: OCR learnings (on merge)
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.OCR_LEARNINGS != 'off'
    runs-on: [self-hosted, ocr-codex-review]
    permissions:
      contents: read
      pull-requests: read
    env:
      OCR_BIN: ${{ vars.OCR_BIN }}
    steps:
      - name: Checkout base (for repo identity / store key)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve OCR binary
        id: ocr_bin
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${OCR_BIN:-}" ]; then
            if [ -x "$OCR_BIN" ] || command -v "$OCR_BIN" >/dev/null 2>&1; then
              printf 'path=%s\n' "$OCR_BIN" >> "$GITHUB_OUTPUT"; exit 0
            fi
            echo "OCR_BIN is set but is not executable and is not on PATH: $OCR_BIN" >&2; exit 1
          fi
          if command -v ocr >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v ocr)" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if command -v opencodereview >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v opencodereview)" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "OpenCodeReview CLI was not found." >&2; exit 1

      - name: Collect final feedback (learnings)
        continue-on-error: true
        uses: actions/github-script@v9
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(process.env.PR_NUMBER);
            // Human disagreement markers (EN + 中文) => an explicit rejection.
            const DISAGREE = /\b(no|wrong|disagree|incorrect|not (right|true)|nah|invalid|false positive|wontfix|won't fix)\b|不对|不需要|误报|没问题|不用改|不是问题|无需|不认同/i;

            const query = `query($owner:String!,$repo:String!,$pr:Int!,$cursor:String){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$pr){
                  reviewThreads(first:50, after:$cursor){
                    pageInfo{ hasNextPage endCursor }
                    nodes{
                      isResolved id
                      comments(first:100){
                        pageInfo{ hasNextPage endCursor }
                        nodes{ id body path createdAt author{ login __typename } }
                      }
                    }
                  }
                }
              }
            }`;
            const commentsQuery = `query($threadId:ID!,$commentsCursor:String){
              node(id:$threadId){ ... on PullRequestReviewThread{
                comments(first:100, after:$commentsCursor){
                  pageInfo{ hasNextPage endCursor }
                  nodes{ id body path createdAt author{ login __typename } }
                } } }
            }`;

            const out = [];
            let cursor = null;
            try {
              do {
                const data = await github.graphql(query, {
                  owner: context.repo.owner, repo: context.repo.repo, pr: prNumber, cursor,
                });
                const threads = data.repository.pullRequest.reviewThreads;
                for (const th of threads.nodes) {
                  const firstPage = th.comments;
                  const cs = firstPage.nodes;
                  if (cs.length === 0) continue;
                  const head = cs[0];
                  // OCR's own comments only: Bot author + the '**OCR**' body prefix.
                  const isOCR = head.body && head.body.startsWith('**OCR**') &&
                    head.author && head.author.__typename === 'Bot';
                  if (!isOCR) continue;

                  let allComments = cs.slice();
                  let cc = firstPage.pageInfo.hasNextPage ? firstPage.pageInfo.endCursor : null;
                  while (cc) {
                    const more = await github.graphql(commentsQuery, { threadId: th.id, commentsCursor: cc });
                    const mp = more?.node?.comments;
                    if (!mp) break;
                    allComments = allComments.concat(mp.nodes);
                    cc = mp.pageInfo.hasNextPage ? mp.pageInfo.endCursor : null;
                  }

                  let verdict = null;
                  if (th.isResolved) {
                    verdict = 'accepted';
                  } else {
                    const humanDisagree = allComments.slice(1).some(c =>
                      c.author && c.author.__typename === 'User' && DISAGREE.test(c.body || ''));
                    if (humanDisagree) verdict = 'rejected';
                    // else: unresolved-at-merge is left ambiguous on purpose (skip).
                  }
                  if (!verdict) continue;
                  out.push({ comment_id: head.id, body: head.body, path: head.path ?? null, verdict });
                }
                cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
              } while (cursor);

              const path = `${process.env.RUNNER_TEMP || '.'}/ocr-feedback.json`;
              fs.writeFileSync(path, JSON.stringify(out));
              core.exportVariable('OCR_LEARNINGS_FEEDBACK', path);
              core.info(`OCR learnings (on merge): wrote ${out.length} verdicted feedback item(s) to ${path}`);
            } catch (err) {
              core.warning(`OCR learnings (on merge): collection failed (non-fatal): ${err && err.message ? err.message : err}`);
            }

      - name: Ingest into learnings store
        if: ${{ env.OCR_LEARNINGS_FEEDBACK != '' }}
        continue-on-error: true
        shell: bash
        env:
          OCR_BIN_PATH: ${{ steps.ocr_bin.outputs.path }}
        run: |
          set -euo pipefail
          "$OCR_BIN_PATH" learn ingest --repo . --feedback "$OCR_LEARNINGS_FEEDBACK"
