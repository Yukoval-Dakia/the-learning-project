name: OCR PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: read

concurrency:
  # Separate close-collection runs from review runs so merging a PR never
  # cancels an in-flight review of the same PR (and vice versa).
  group: ocr-codex-review-${{ github.event.pull_request.number }}-${{ github.event.action == 'closed' && 'close' || 'review' }}
  cancel-in-progress: true

jobs:
  review:
    name: OCR review
    if: >
      github.event.action != 'closed' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: [self-hosted, ocr-codex-review]
    # Backstop: a stalled step (e.g. artifact upload hanging against GitHub's
    # blob storage) must not pin the job to the 6h default. Review itself is
    # bounded by OCR_TIMEOUT_MINUTES (default 20); 45 leaves generous headroom.
    timeout-minutes: 45
    permissions:
      contents: read
      issues: write
      pull-requests: write
    env:
      OCR_BIN: ${{ vars.OCR_BIN }}
      OCR_CONCURRENCY: ${{ vars.OCR_CONCURRENCY }}
      OCR_MAX_TOOLS: ${{ vars.OCR_MAX_TOOLS }}
      OCR_TIMEOUT_MINUTES: ${{ vars.OCR_TIMEOUT_MINUTES }}
    steps:
      - name: Checkout pull request merge
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve OCR binary
        id: ocr_bin
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${OCR_BIN:-}" ]; then
            if [ -x "$OCR_BIN" ] || command -v "$OCR_BIN" >/dev/null 2>&1; then
              printf 'path=%s\n' "$OCR_BIN" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "OCR_BIN is set but is not executable and is not on PATH: $OCR_BIN" >&2
            exit 1
          fi

          if command -v ocr >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v ocr)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if command -v opencodereview >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v opencodereview)" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "OpenCodeReview CLI was not found. Install it on the self-hosted runner or set repository variable OCR_BIN." >&2
          exit 1

      - name: Fetch pull request refs
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          git fetch --no-tags origin \
            "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" \
            "+refs/pull/${PR_NUMBER}/head:refs/remotes/pull/${PR_NUMBER}/head"

          git cat-file -e "${BASE_SHA}^{commit}"
          git cat-file -e "refs/remotes/pull/${PR_NUMBER}/head^{commit}"

      - name: Collect prior-comment feedback (learnings)
        if: ${{ vars.OCR_LEARNINGS != 'off' }}
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(process.env.PR_NUMBER);
            const DISAGREE = /\b(no|wrong|disagree|incorrect|not (right|true)|nah|invalid)\b/i;
            const STALE_DAYS = 7;
            const now = Date.now();

            try {
              // Page through this PR's review threads via GraphQL (isResolved lives here).
              // Each thread's first page of comments is fetched inline (first:100).
              // Fix 1 — comment pagination: if a thread is an OCR thread AND its first
              // comment page has hasNextPage, we fetch additional pages via a dedicated
              // query keyed by the thread's databaseId. This avoids over-fetching on the
              // common case (most threads have <100 comments) while ensuring we see every
              // human reply before computing the verdict.
              const query = `query($owner:String!,$repo:String!,$pr:Int!,$cursor:String){
                repository(owner:$owner,name:$repo){
                  pullRequest(number:$pr){
                    reviewThreads(first:50, after:$cursor){
                      pageInfo{ hasNextPage endCursor }
                      nodes{
                        isResolved
                        isOutdated
                        id
                        comments(first:100){
                          pageInfo{ hasNextPage endCursor }
                          nodes{
                            id body path createdAt
                            author{ login __typename }
                          }
                        }
                      }
                    }
                  }
                }
              }`;

              // Follow-up query to fetch remaining comment pages for a single thread.
              const commentsQuery = `query($threadId:ID!,$commentsCursor:String){
                node(id:$threadId){
                  ... on PullRequestReviewThread{
                    comments(first:100, after:$commentsCursor){
                      pageInfo{ hasNextPage endCursor }
                      nodes{
                        id body path createdAt
                        author{ login __typename }
                      }
                    }
                  }
                }
              }`;

              const out = [];
              let cursor = null;
              do {
                const data = await github.graphql(query, {
                  owner: context.repo.owner, repo: context.repo.repo, pr: prNumber, cursor,
                });
                const threads = data.repository.pullRequest.reviewThreads;
                for (const th of threads.nodes) {
                  const firstPage = th.comments;
                  const cs = firstPage.nodes;
                  if (cs.length === 0) continue;
                  // The first comment in a thread is the original review comment.
                  const head = cs[0];
                  // Fix 2 — verify the OCR comment's author is a Bot, not just body prefix.
                  // A human comment starting with '**OCR**' would otherwise be misclassified.
                  const isOCR = head.body && head.body.startsWith('**OCR**') &&
                    head.author && head.author.__typename === 'Bot';
                  if (!isOCR) continue;

                  // Collect all comment nodes; add more pages if needed (Fix 1).
                  let allComments = cs.slice();
                  let commentsCursor = firstPage.pageInfo.hasNextPage ? firstPage.pageInfo.endCursor : null;
                  while (commentsCursor) {
                    const moreData = await github.graphql(commentsQuery, {
                      threadId: th.id, commentsCursor,
                    });
                    const morePage = moreData?.node?.comments;
                    if (!morePage) break;
                    allComments = allComments.concat(morePage.nodes);
                    commentsCursor = morePage.pageInfo.hasNextPage ? morePage.pageInfo.endCursor : null;
                  }

                  let verdict = null;
                  if (th.isResolved) {
                    verdict = 'accepted';
                  } else {
                    // Any human reply expressing disagreement => rejected.
                    const humanDisagree = allComments.slice(1).some(c =>
                      c.author && c.author.__typename === 'User' && DISAGREE.test(c.body || ''));
                    if (humanDisagree) {
                      verdict = 'rejected';
                    } else if (th.isOutdated) {
                      // Commented code changed with no objection => addressed.
                      verdict = 'accepted';
                    } else {
                      const ageDays = (now - Date.parse(head.createdAt)) / 86400000;
                      if (ageDays > STALE_DAYS) verdict = 'rejected';
                    }
                  }
                  if (!verdict) continue; // ambiguous -> skip

                  out.push({
                    comment_id: head.id,
                    body: head.body,
                    path: head.path ?? null, // Fix 3 — null (not '') for missing path
                    verdict,
                  });
                }
                cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
              } while (cursor);

              const path = `${process.env.RUNNER_TEMP || '.'}/ocr-feedback.json`;
              fs.writeFileSync(path, JSON.stringify(out));
              core.exportVariable('OCR_LEARNINGS_FEEDBACK', path);
              core.info(`OCR learnings: wrote ${out.length} verdicted feedback item(s) to ${path}`);
            } catch (err) {
              core.warning(`OCR learnings: feedback collection failed (review continues): ${err && err.message ? err.message : err}`);
            }

      - name: Run OCR review
        id: run_ocr_review
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          OCR_CONCURRENCY="${OCR_CONCURRENCY:-1}"
          OCR_MAX_TOOLS="${OCR_MAX_TOOLS:-6}"
          OCR_TIMEOUT_MINUTES="${OCR_TIMEOUT_MINUTES:-20}"

          "${{ steps.ocr_bin.outputs.path }}" review \
            --repo "$GITHUB_WORKSPACE" \
            --from "$BASE_SHA" \
            --to "refs/remotes/pull/${PR_NUMBER}/head" \
            --audience agent \
            --format json \
            --concurrency "$OCR_CONCURRENCY" \
            --max-tools "$OCR_MAX_TOOLS" \
            --timeout "$OCR_TIMEOUT_MINUTES" \
            > ocr-review.json

          test -s ocr-review.json

      - name: Upsert PR review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');

            const runId = Number.isFinite(context.runId) ? context.runId : 0;
            const envAttempt = parseInt(process.env.GITHUB_RUN_ATTEMPT, 10);
            const runAttempt = (Number.isFinite(envAttempt) && envAttempt >= 1)
              ? envAttempt
              : (Number.isFinite(context.runAttempt) ? context.runAttempt : 1);
            const RUN_TAG = `${runId}-${runAttempt}`;
            const REVIEW_TAG = `<!-- ocr-codex-review run=${RUN_TAG} -->`;
            const SUMMARY_TAG = `<!-- ocr-codex-review-summary:${RUN_TAG} -->`;

            const raw = fs.readFileSync('ocr-review.json', 'utf8');
            const result = JSON.parse(raw);
            const summary = result.summary || {};
            const comments = Array.isArray(result.comments) ? result.comments : [];
            const warnings = result.warnings || [];

            const fenced = (value) => {
              const text = String(value || '').trim();
              if (!text) return '';
              return `\n\`\`\`\n${text.replaceAll('\`\`\`', '\`\\\`\\\`')}\n\`\`\``;
            };

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const commit_id = context.payload.pull_request.head.sha;

            const headerLines = [
              REVIEW_TAG,
              '## OCR review',
              '',
              `Reviewed commit: \`${(commit_id || '').slice(0, 8)}\``,
              `Status: \`${result.status || 'unknown'}\``,
              `Files reviewed: \`${summary.files_reviewed ?? 0}\``,
              `Comments: \`${summary.comments ?? comments.length}\``,
              `Elapsed: \`${summary.elapsed || 'n/a'}\``,
            ];

            function commentBody(comment) {
              const sev = comment.severity ? ` \`${comment.severity}\`` : '';
              const conf = (typeof comment.confidence === 'number') ? ` (confidence ${comment.confidence.toFixed(2)})` : '';
              const out = [`**OCR**${sev}${conf}`, '', String(comment.content || '').trim()];
              if (comment.suggestion_code) {
                out.push('', 'Suggested replacement:', fenced(comment.suggestion_code));
              }
              return out.join('\n');
            }

            function stableCommentId(comment) {
              const key = [
                comment.path || '',
                comment.start_line || 0,
                comment.end_line || 0,
                String(comment.content || '').trim(),
              ].join('\0');
              const hash = crypto.createHash('sha256').update(key).digest('hex').slice(0, 16);
              return `ocr-${RUN_TAG}-${hash}`;
            }

            function inlineItem(comment) {
              const line = comment.end_line || comment.start_line;
              if (!comment.path || !line) return null;
              const start = comment.start_line;
              const end = comment.end_line;
              if (start >= 1 && end >= 1 && start < end) {
                return { comment, id: stableCommentId(comment), lines: { start_line: start, line: end, start_side: 'RIGHT', side: 'RIGHT' } };
              } else if (end >= 1) {
                return { comment, id: stableCommentId(comment), lines: { line: end, side: 'RIGHT' } };
              } else if (start >= 1) {
                return { comment, id: stableCommentId(comment), lines: { line: start, side: 'RIGHT' } };
              }
              return null;
            }

            function summaryEntry(comment, idx) {
              const location = [
                comment.path || 'unknown',
                comment.start_line ? `:${comment.start_line}` : '',
                comment.end_line && comment.end_line !== comment.start_line ? `-${comment.end_line}` : '',
              ].join('');
              const parts = [`### ${idx}. \`${location}\``, '', commentBody(comment)];
              if (comment.existing_code) {
                parts.push('', 'Existing code:', fenced(comment.existing_code));
              }
              return parts.join('\n');
            }

            function formatSummaryComments(summaryComments) {
              let body = '';
              for (let i = 0; i < summaryComments.length; i++) {
                body += '\n\n---\n\n';
                body += summaryEntry(summaryComments[i].comment, i + 1);
              }
              return body;
            }

            // Retry / pacing configuration.
            function parseNonNegInt(val, defaultVal) {
              const n = parseInt(val, 10);
              return Number.isFinite(n) && n >= 0 ? n : defaultVal;
            }
            const MAX_RETRIES = parseNonNegInt(process.env.OCR_MAX_RETRIES, 3);
            const SUCCESS_DELAY = parseNonNegInt(process.env.OCR_SUCCESS_DELAY, 2000);
            const FAILURE_DELAY = parseNonNegInt(process.env.OCR_FAILURE_DELAY, 1000);
            const LOW_REMAINING_THRESHOLD = parseNonNegInt(process.env.OCR_LOW_REMAINING_THRESHOLD, 3);
            const LOW_REMAINING_SPACING = parseNonNegInt(process.env.OCR_LOW_REMAINING_SPACING, 10000);
            const READ_SUCCESS_DELAY = parseNonNegInt(process.env.OCR_READ_SUCCESS_DELAY, 500);
            const READ_LOW_REMAINING_SPACING = parseNonNegInt(process.env.OCR_READ_LOW_REMAINING_SPACING, 5000);

            function sleep(ms) {
              return new Promise(resolve => setTimeout(resolve, ms));
            }

            async function withRetry(tag, fn) {
              for (let attempt = 0; attempt <= MAX_RETRIES; attempt++) {
                try {
                  return await fn();
                } catch (e) {
                  const retryInfo = computeRetryDelayMs(e, attempt);
                  const willRetry = retryInfo != null && attempt < MAX_RETRIES;
                  if (willRetry) {
                    const secs = (retryInfo.delayMs / 1000).toFixed(1);
                    console.log(`[${tag}] transient/rate-limited (HTTP ${e.status}, attempt ${attempt + 1}/${MAX_RETRIES}). Waiting ${secs}s via '${retryInfo.source}' (${retryInfo.detail}). ${e.message}`);
                    await sleep(retryInfo.delayMs);
                  } else {
                    console.log(`[${tag}] failed after ${attempt + 1} attempts: ${e.message}`);
                    throw e;
                  }
                }
              }
              throw new Error(`[${tag}] exhausted retries without result`);
            }

            async function readWithPacing(tag, fn) {
              const res = await withRetry(tag, fn);
              const remaining = logRateLimitQuota(res, tag);
              const lowQuota = remaining != null && remaining <= LOW_REMAINING_THRESHOLD;
              if (lowQuota) {
                console.log(`[rate-limit] quota low after read (${remaining} <= ${LOW_REMAINING_THRESHOLD}); spacing ${READ_LOW_REMAINING_SPACING}ms.`);
                await sleep(READ_LOW_REMAINING_SPACING);
              } else {
                await sleep(READ_SUCCESS_DELAY);
              }
              return res;
            }

            async function readAllPages(tag, pageFn, maxPages = 50) {
              if (!Number.isFinite(maxPages) || maxPages < 1) {
                throw new Error(`readAllPages: maxPages must be a positive integer, got ${maxPages}`);
              }
              const all = [];
              let page = 1;
              const PER_PAGE = 100;
              while (page <= maxPages) {
                const res = await readWithPacing(`${tag} (page ${page})`, () => pageFn(page, PER_PAGE));
                const items = res.data || [];
                all.push(...items);
                if (items.length < PER_PAGE) break;
                page++;
              }
              if (page > maxPages) {
                console.log(`[${tag}] reached max page limit (${maxPages}); results may be incomplete.`);
              }
              return all;
            }

            async function findExistingBatchReview({ owner, repo, prNumber, tag }) {
              const reviews = await readAllPages('listReviews', (page, per_page) =>
                github.rest.pulls.listReviews({ owner, repo, pull_number: prNumber, per_page, page })
              );
              for (const r of reviews) {
                if ((r.body || '').includes(tag)) {
                  return { found: true, review: r };
                }
              }
              return { found: false };
            }

            async function getPostedCommentIds({ owner, repo, prNumber }) {
              const cs = await readAllPages('listReviewComments', (page, per_page) =>
                github.rest.pulls.listReviewComments({ owner, repo, pull_number: prNumber, per_page, page })
              );
              const ids = new Set();
              const ID_RE = /<!--\s*(ocr-\d+-\d+-[a-f0-9]+)\s*-->/g;
              for (const c of cs) {
                const body = c.body || '';
                let m;
                ID_RE.lastIndex = 0;
                while ((m = ID_RE.exec(body)) !== null) {
                  ids.add(m[1]);
                }
              }
              return ids;
            }

            async function partitionReviewCommentsByPosted({ owner, repo, prNumber, items }) {
              const postedIds = await getPostedCommentIds({ owner, repo, prNumber });
              const missing = items.filter((item) => !postedIds.has(item.id));
              return { missing, postedCount: items.length - missing.length };
            }

            function isBatchReviewWithSummary(body) {
              const text = body || '';
              return text.includes(REVIEW_TAG) && text.includes('## OCR review');
            }

            async function isCommentAlreadyPosted({ owner, repo, prNumber, id }) {
              try {
                const posted = await getPostedCommentIds({ owner, repo, prNumber });
                return posted.has(id);
              } catch (e) {
                console.log(`[isCommentAlreadyPosted] check failed for ${id} (${e.message}); treating as unknown to avoid duplicates.`);
                return null;
              }
            }

            async function hasIssueCommentWithId({ owner, repo, issueNumber, id }) {
              try {
                const comments = await readAllPages('listIssueComments', (page, per_page) =>
                  github.rest.issues.listComments({ owner, repo, issue_number: issueNumber, per_page, page })
                );
                // id (SUMMARY_TAG) is already a complete HTML comment, e.g. <!-- ocr-codex-review-summary:123-1 -->
                const escaped = id.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const tagRe = new RegExp(escaped);
                return comments.some(c => tagRe.test(c.body || ''));
              } catch (e) {
                console.log(`[listIssueComments] check failed (${e.message}); treating as unknown to avoid duplicates.`);
                return null;
              }
            }

            function getHeader(headers, name) {
              const v = headers[name] != null ? headers[name] : headers[name.toLowerCase()];
              return v != null ? String(v).trim() : undefined;
            }

            function computeRetryDelayMs(error, attempt) {
              if (!error) return null;
              const status = error.status;
              const message = String(error.message || '');
              const isNetwork = status == null && /ECONNRESET|ETIMEDOUT|ENOTFOUND|socket|network|fetch failed|aborted/i.test(message);
              const isRateLimit = status === 429 || (status === 403 && /rate limit|abuse|secondary/i.test(message));
              const isTransient = (status >= 500 && status < 600) || status === 408 || isNetwork;
              if (!isRateLimit && !isTransient) return null;

              const headers = ((error.response || {}).headers) || {};
              const header = (name) => getHeader(headers, name);
              const nowSec = Math.floor(Date.now() / 1000);

              const cap = parseInt(process.env.OCR_RETRY_MAX_DELAY, 10) || 300000;
              const base = parseInt(process.env.OCR_RETRY_BASE_DELAY, 10) || 60000;

              let info = null;
              if (isRateLimit) {
                const retryAfter = header('retry-after');
                if (retryAfter) {
                  const secs = Number(retryAfter);
                  if (!isNaN(secs) && secs >= 0) {
                    info = { rawMs: secs * 1000, source: 'retry-after', detail: `${secs}s (from header)` };
                  } else {
                    const dateMs = Date.parse(retryAfter);
                    if (!isNaN(dateMs)) {
                      info = { rawMs: Math.max(0, dateMs - Date.now()), source: 'retry-after (HTTP-date)', detail: retryAfter };
                    }
                  }
                }
                if (!info) {
                  const remaining = header('x-ratelimit-remaining');
                  const reset = header('x-ratelimit-reset');
                  if (reset != null && Number(remaining) === 0) {
                    const rawMs = Math.max(0, Number(reset) - nowSec) * 1000;
                    info = { rawMs, source: 'x-ratelimit-reset', detail: `remaining=0, reset epoch=${reset} (in ${Math.ceil(rawMs / 1000)}s)` };
                  }
                }
                if (!info) {
                  const backoff = Math.min(base * Math.pow(2, attempt), cap);
                  const jitter = Math.floor(Math.random() * 1000);
                  info = { rawMs: backoff + jitter, source: 'exponential-backoff', detail: `base=${base}ms*2^${attempt} (cap ${cap}ms) +${jitter}ms jitter` };
                }
              } else {
                const transientBase = 2000;
                const backoff = Math.min(transientBase * Math.pow(2, attempt), cap);
                const jitter = Math.floor(Math.random() * 1000);
                info = { rawMs: backoff + jitter, source: 'transient-backoff', detail: `base=${transientBase}ms*2^${attempt} (cap ${cap}ms) +${jitter}ms jitter (HTTP ${status})` };
              }

              const delayMs = Math.min(info.rawMs, cap);
              if (delayMs < info.rawMs) {
                info.detail += ` [CAPPED to ${cap}ms; GitHub recommended ${Math.ceil(info.rawMs / 1000)}s]`;
              }
              return { delayMs, source: info.source, detail: info.detail };
            }

            function logRateLimitQuota(response, tag) {
              try {
                const h = (response && response.headers) || {};
                const header = (name) => getHeader(h, name);
                const remaining = header('x-ratelimit-remaining');
                const limit = header('x-ratelimit-limit');
                const reset = header('x-ratelimit-reset');
                if (remaining != null) {
                  console.log(`[rate-limit] ${tag}: remaining=${remaining}/${limit != null ? limit : '?'}` + (reset != null ? `, reset epoch=${reset}` : ''));
                }
                return remaining != null ? Number(remaining) : null;
              } catch (_) { return null; }
            }

            function toReviewPayload(item) {
              return {
                path: item.comment.path,
                body: `<!-- ${item.id} -->\n` + commentBody(item.comment),
                ...item.lines
              };
            }

            // Main posting logic.
            const reviewComments = [];
            const commentsWithoutLine = [];
            for (const comment of comments) {
              const item = inlineItem(comment);
              if (!item) {
                commentsWithoutLine.push({ comment });
              } else {
                reviewComments.push(item);
              }
            }

            const totalCount = comments.length;
            const inlineCount = reviewComments.length;
            const summaryCount = commentsWithoutLine.length;
            let summaryBody = headerLines.join('\n');
            summaryBody += formatSummaryComments(commentsWithoutLine);

            if (comments.length === 0) {
              summaryBody += '\n\nNo actionable comments found.';
              let emptyReviewExists = false;
              try {
                const existing = await findExistingBatchReview({ owner, repo, prNumber: issue_number, tag: REVIEW_TAG });
                emptyReviewExists = existing.found;
              } catch (checkErr) {
                console.log(`Empty-review idempotency check failed (${checkErr.message}); attempting create anyway.`);
              }
              if (!emptyReviewExists) {
                await withRetry('createReview(empty)', () => github.rest.pulls.createReview({
                  owner, repo, pull_number: issue_number, commit_id, event: 'COMMENT', body: summaryBody
                }));
              } else {
                console.log('Empty review with this run tag already exists; skipping.');
              }
              return;
            }

            async function attemptBatchCreateReview() {
              try {
                const existing = await findExistingBatchReview({ owner, repo, prNumber: issue_number, tag: REVIEW_TAG });
                const { missing, postedCount } = await partitionReviewCommentsByPosted({
                  owner, repo, prNumber: issue_number, items: reviewComments,
                });
                if (missing.length === 0) {
                  const reviewId = existing.found ? existing.review.id : 'n/a';
                  console.log(`All inline comments already posted (review_id=${reviewId}); skipping duplicate create.`);
                  return { data: existing.found ? existing.review : {}, headers: {} };
                }
                if (existing.found || postedCount > 0) {
                  const err = new Error(
                    existing.found
                      ? 'Batch review exists but inline comments incomplete'
                      : `${postedCount}/${reviewComments.length} inline comments already posted without tagged batch review`,
                  );
                  err.status = 409;
                  throw err;
                }
              } catch (checkErr) {
                if (checkErr.status === 409) throw checkErr;
                console.log(`Pre-create idempotency check failed (${checkErr.message}); attempting create anyway.`);
              }
              return github.rest.pulls.createReview({
                owner, repo, pull_number: issue_number, commit_id,
                body: summaryBody,
                event: 'COMMENT',
                comments: reviewComments.map(toReviewPayload)
              });
            }

            let successCount = 0;
            let failedCount = 0;
            let unverifiableCount = 0;
            const failedComments = [];

            try {
              const batchRes = await withRetry('createReview(batch)', () => attemptBatchCreateReview());
              successCount = reviewComments.length;
              console.log(`Successfully posted review with ${successCount} inline comments (${commentsWithoutLine.length} in summary)`);
              logRateLimitQuota(batchRes, 'after batch createReview');
            } catch (e) {
              console.log('Failed to post review with inline comments:', e.message);
              console.log('Checking whether the batch review actually landed on the server before retrying...');

              let existingReview = null;
              try {
                existingReview = await findExistingBatchReview({ owner, repo, prNumber: issue_number, tag: REVIEW_TAG });
              } catch (checkErr) {
                console.log(`Idempotency check failed (${checkErr.message}). Degrading to original fallback (accepting duplicate risk).`);
              }

              let toRetry = reviewComments;
              try {
                const { missing, postedCount } = await partitionReviewCommentsByPosted({
                  owner, repo, prNumber: issue_number, items: reviewComments,
                });
                toRetry = missing;
                successCount = postedCount;
                if (toRetry.length === 0) {
                  console.log('All inline comments already posted; skipping per-comment fallback.');
                } else if (postedCount > 0) {
                  const reviewId = existingReview?.found ? existingReview.review.id : 'n/a';
                  console.log(`${postedCount}/${reviewComments.length} inline comments already posted. ${toRetry.length} missing, will retry only those (review_id=${reviewId}).`);
                } else {
                  console.log('Batch review not found on server. Falling back to per-comment posting...');
                }
              } catch (idErr) {
                console.log(`Failed to enumerate posted comment ids (${idErr.message}); retrying all inline comments.`);
              }

              const batchRetry = computeRetryDelayMs(e, 0);
              if (batchRetry != null) {
                const secs = (batchRetry.delayMs / 1000).toFixed(1);
                console.log(`Batch createReview was rate-limited (HTTP ${e.status}). Cooling down ${secs}s via '${batchRetry.source}' (${batchRetry.detail}) before per-comment retry.`);
                await sleep(batchRetry.delayMs);
              }

              for (const item of toRetry) {
                const { comment, id } = item;
                let posted = false;
                for (let attempt = 0; attempt <= MAX_RETRIES && !posted; attempt++) {
                  try {
                    const res = await github.rest.pulls.createReview({
                      owner, repo, pull_number: issue_number, commit_id,
                      body: REVIEW_TAG, event: 'COMMENT', comments: [toReviewPayload(item)]
                    });
                    successCount++;
                    posted = true;
                    console.log(`Successfully posted comment for ${comment.path}`);
                    const remaining = logRateLimitQuota(res, `after ${comment.path}`);
                    const lowQuota = remaining != null && remaining <= LOW_REMAINING_THRESHOLD;
                    if (lowQuota) {
                      console.log(`[rate-limit] quota low (remaining=${remaining} <= ${LOW_REMAINING_THRESHOLD}); increasing spacing to ${LOW_REMAINING_SPACING}ms.`);
                      await sleep(LOW_REMAINING_SPACING);
                    } else {
                      await sleep(SUCCESS_DELAY);
                    }
                  } catch (innerE) {
                    const retryInfo = computeRetryDelayMs(innerE, attempt);
                    const willRetry = retryInfo != null && attempt < MAX_RETRIES;
                    const status = innerE.status;
                    const maybeReachedServer = (typeof status === 'number' && (status >= 500 || status === 408)) || status == null;
                    if (maybeReachedServer) {
                      const coolDownMs = retryInfo != null ? retryInfo.delayMs : FAILURE_DELAY;
                      if (coolDownMs > 0) {
                        const secs = (coolDownMs / 1000).toFixed(1);
                        console.log(`Cooling down ${secs}s before idempotency check for ${comment.path} (HTTP ${innerE.status || 'n/a'}, attempt ${attempt + 1}/${MAX_RETRIES + 1}).`);
                        await sleep(coolDownMs);
                      }
                      const alreadyPosted = await isCommentAlreadyPosted({ owner, repo, prNumber: issue_number, id });
                      if (alreadyPosted === true) {
                        successCount++;
                        posted = true;
                        console.log(`Comment for ${comment.path} already posted (id=${id}); treating as success.`);
                        await sleep(SUCCESS_DELAY);
                        continue;
                      }
                      if (alreadyPosted === null) {
                        unverifiableCount++;
                        const reason = 'idempotency check unavailable (read API failed)';
                        failedComments.push({ comment, error: `${innerE.message} [${reason}]` });
                        console.log(`Cannot verify whether comment for ${comment.path} was posted (${reason}, HTTP ${innerE.status || 'n/a'}); skipping retry to avoid duplicate.`);
                        await sleep(SUCCESS_DELAY);
                        break;
                      }
                      if (!willRetry) {
                        failedCount++;
                        failedComments.push({ comment, error: innerE.message });
                        const reason = retryInfo == null ? 'non-retryable error' : 'rate-limit retries exhausted';
                        console.log(`Failed to post comment for ${comment.path} (${reason}, HTTP ${innerE.status || 'n/a'}): ${innerE.message}`);
                        await sleep(SUCCESS_DELAY);
                        break;
                      }
                    } else if (willRetry) {
                      const secs = (retryInfo.delayMs / 1000).toFixed(1);
                      console.log(`Rate-limited on ${comment.path} (HTTP ${innerE.status}, attempt ${attempt + 1}/${MAX_RETRIES}). Waiting ${secs}s via '${retryInfo.source}' (${retryInfo.detail}). Error: ${innerE.message}`);
                      await sleep(retryInfo.delayMs);
                    } else if (innerE.status === 422) {
                      failedCount++;
                      failedComments.push({ comment, error: innerE.message });
                      console.log(`Failed to post comment for ${comment.path} (422 line not in diff): ${innerE.message}`);
                      await sleep(FAILURE_DELAY);
                      break;
                    } else {
                      failedCount++;
                      failedComments.push({ comment, error: innerE.message });
                      console.log(`Failed to post comment for ${comment.path} (non-retryable error, HTTP ${innerE.status || 'n/a'}): ${innerE.message}`);
                      await sleep(FAILURE_DELAY);
                      break;
                    }
                  }
                }
              }

              // Unanchored findings only lived on the failed batch request body; per-comment
              // fallback tags reviews with REVIEW_TAG but not the full batch summary body.
              const batchReviewLanded = !!(
                existingReview &&
                existingReview.found &&
                isBatchReviewWithSummary(existingReview.review.body)
              );
              const shouldPostSummary =
                failedCount > 0 ||
                unverifiableCount > 0 ||
                failedComments.length > 0 ||
                (commentsWithoutLine.length > 0 && !batchReviewLanded);
              if (!shouldPostSummary) {
                if (commentsWithoutLine.length > 0 && batchReviewLanded) {
                  console.log('Unanchored findings are in the landed batch review body; skipping issue summary.');
                } else {
                  console.log('All inline comments posted successfully; skipping separate summary issue comment.');
                }
              } else {
              let finalBody = headerLines.join('\n');
              finalBody += formatSummaryComments(commentsWithoutLine);
              finalBody += `\n\n---\n\n📊 **Posting Statistics:**`;
              finalBody += `\n- ✅ Successfully posted: ${successCount} comment(s)`;
              if (failedCount > 0) {
                finalBody += `\n- ❌ Failed to post: ${failedCount} comment(s)`;
              }
              if (unverifiableCount > 0) {
                finalBody += `\n- ⚠️ Unverifiable (skipped to avoid duplicates): ${unverifiableCount} comment(s)`;
              }
              if (failedComments.length > 0) {
                finalBody += '\n\n---\n\n### ⚠️ Inline comments shown in summary';
                for (const { comment, error } of failedComments) {
                  finalBody += '\n\n---\n\n';
                  finalBody += `### 📄 \`${comment.path}\``;
                  if (comment.start_line && comment.end_line) {
                    finalBody += ` (L${comment.start_line}-L${comment.end_line})`;
                  }
                  finalBody += `\n\n⚠️ GitHub could not post this as an inline comment: ${error}\n\n`;
                  finalBody += commentBody(comment);
                  if (comment.existing_code) {
                    finalBody += '\n\nExisting code:' + fenced(comment.existing_code);
                  }
                }
              }

              finalBody = SUMMARY_TAG + '\n' + finalBody;
              const summaryAlreadyPosted = await hasIssueCommentWithId({ owner, repo, issueNumber: issue_number, id: SUMMARY_TAG });
              if (summaryAlreadyPosted === true) {
                console.log('Summary comment with this run tag already exists; skipping.');
              } else if (summaryAlreadyPosted === null) {
                console.log('Cannot verify whether summary comment already exists (read API failed); skipping to avoid duplicate.');
              } else {
                await withRetry('createComment(summary)', () =>
                  github.rest.issues.createComment({ owner, repo, issue_number, body: finalBody })
                );
              }
              }
            }

      # Diagnostic artifact only — no downstream consumer (learnings collect via
      # GraphQL, upsert reads local disk), so it runs AFTER the review comment is
      # posted: a stalled/failed upload can never delay the user-visible review.
      # The if-condition keeps it alive when the upsert step fails (that is when
      # the diagnostic matters most) while still requiring the review step to
      # have produced ocr-review.json, and never resurrecting a cancelled job.
      # continue-on-error swallows failures; the step-level timeout converts a
      # stalled blob upload ("Error: Upload progress stalled", observed 2026-07-07
      # hanging 32+ min and blocking the comment) into a fast failure; one bounded
      # retry then covers the transient-blip case.
      - name: Upload OCR review JSON
        id: upload_review_json
        if: ${{ !cancelled() && steps.run_ocr_review.outcome == 'success' }}
        continue-on-error: true
        timeout-minutes: 5
        uses: actions/upload-artifact@v7
        with:
          name: ocr-codex-review-${{ github.event.pull_request.number }}
          path: ocr-review.json
          if-no-files-found: error
          retention-days: 7

      - name: Upload OCR review JSON (retry)
        if: ${{ !cancelled() && steps.upload_review_json.outcome == 'failure' }}
        continue-on-error: true
        timeout-minutes: 5
        uses: actions/upload-artifact@v7
        with:
          name: ocr-codex-review-${{ github.event.pull_request.number }}
          path: ocr-review.json
          if-no-files-found: error
          retention-days: 7
          overwrite: true

  # When a PR is MERGED, capture the final verdict of OCR's inline comments and
  # ingest them into the learnings store — WITHOUT running an LLM review. This is
  # the reliable capture point: the review-time collector misses verdicts that
  # only settle after the last review (e.g. fix-commit, then resolve, then merge
  # with no further review trigger). Conservative rules avoid noisy "rejected":
  #   resolved -> accepted; unresolved + human disagree reply -> rejected; else skip.
  collect-on-merge:
    name: OCR learnings (on merge)
    if: >
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      vars.OCR_LEARNINGS != 'off'
    runs-on: [self-hosted, ocr-codex-review]
    # Same stall backstop as the review job (no LLM here; generous for GraphQL
    # pagination + learnings ingest).
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: read
    env:
      OCR_BIN: ${{ vars.OCR_BIN }}
    steps:
      - name: Checkout base (for repo identity / store key)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 1
          persist-credentials: false

      - name: Resolve OCR binary
        id: ocr_bin
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${OCR_BIN:-}" ]; then
            if [ -x "$OCR_BIN" ] || command -v "$OCR_BIN" >/dev/null 2>&1; then
              printf 'path=%s\n' "$OCR_BIN" >> "$GITHUB_OUTPUT"; exit 0
            fi
            echo "OCR_BIN is set but is not executable and is not on PATH: $OCR_BIN" >&2; exit 1
          fi
          if command -v ocr >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v ocr)" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if command -v opencodereview >/dev/null 2>&1; then
            printf 'path=%s\n' "$(command -v opencodereview)" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "OpenCodeReview CLI was not found." >&2; exit 1

      - name: Collect final feedback (learnings)
        continue-on-error: true
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs');
            const prNumber = Number(process.env.PR_NUMBER);
            // Human disagreement markers (EN + 中文) => an explicit rejection.
            const DISAGREE = /\b(no|wrong|disagree|incorrect|not (right|true)|nah|invalid|false positive|wontfix|won't fix)\b|不对|不需要|误报|没问题|不用改|不是问题|无需|不认同/i;

            const query = `query($owner:String!,$repo:String!,$pr:Int!,$cursor:String){
              repository(owner:$owner,name:$repo){
                pullRequest(number:$pr){
                  reviewThreads(first:50, after:$cursor){
                    pageInfo{ hasNextPage endCursor }
                    nodes{
                      isResolved isOutdated id
                      comments(first:100){
                        pageInfo{ hasNextPage endCursor }
                        nodes{ id body path createdAt author{ login __typename } }
                      }
                    }
                  }
                }
              }
            }`;
            const commentsQuery = `query($threadId:ID!,$commentsCursor:String){
              node(id:$threadId){ ... on PullRequestReviewThread{
                comments(first:100, after:$commentsCursor){
                  pageInfo{ hasNextPage endCursor }
                  nodes{ id body path createdAt author{ login __typename } }
                } } }
            }`;

            const out = [];
            let cursor = null;
            try {
              do {
                const data = await github.graphql(query, {
                  owner: context.repo.owner, repo: context.repo.repo, pr: prNumber, cursor,
                });
                const threads = data.repository.pullRequest.reviewThreads;
                for (const th of threads.nodes) {
                  const firstPage = th.comments;
                  const cs = firstPage.nodes;
                  if (cs.length === 0) continue;
                  const head = cs[0];
                  // OCR's own comments only: Bot author + the '**OCR**' body prefix.
                  const isOCR = head.body && head.body.startsWith('**OCR**') &&
                    head.author && head.author.__typename === 'Bot';
                  if (!isOCR) continue;

                  let allComments = cs.slice();
                  let cc = firstPage.pageInfo.hasNextPage ? firstPage.pageInfo.endCursor : null;
                  while (cc) {
                    const more = await github.graphql(commentsQuery, { threadId: th.id, commentsCursor: cc });
                    const mp = more?.node?.comments;
                    if (!mp) break;
                    allComments = allComments.concat(mp.nodes);
                    cc = mp.pageInfo.hasNextPage ? mp.pageInfo.endCursor : null;
                  }

                  let verdict = null;
                  if (th.isResolved) {
                    verdict = 'accepted';
                  } else {
                    const humanDisagree = allComments.slice(1).some(c =>
                      c.author && c.author.__typename === 'User' && DISAGREE.test(c.body || ''));
                    if (humanDisagree) verdict = 'rejected';
                    else if (th.isOutdated) verdict = 'accepted'; // code changed => addressed
                    // else: unresolved-at-merge is left ambiguous on purpose (skip).
                  }
                  if (!verdict) continue;
                  out.push({ comment_id: head.id, body: head.body, path: head.path ?? null, verdict });
                }
                cursor = threads.pageInfo.hasNextPage ? threads.pageInfo.endCursor : null;
              } while (cursor);

              const path = `${process.env.RUNNER_TEMP || '.'}/ocr-feedback.json`;
              fs.writeFileSync(path, JSON.stringify(out));
              core.exportVariable('OCR_LEARNINGS_FEEDBACK', path);
              core.info(`OCR learnings (on merge): wrote ${out.length} verdicted feedback item(s) to ${path}`);
            } catch (err) {
              core.warning(`OCR learnings (on merge): collection failed (non-fatal): ${err && err.message ? err.message : err}`);
            }

      - name: Ingest into learnings store
        if: ${{ env.OCR_LEARNINGS_FEEDBACK != '' }}
        continue-on-error: true
        shell: bash
        env:
          OCR_BIN_PATH: ${{ steps.ocr_bin.outputs.path }}
        run: |
          set -euo pipefail
          "$OCR_BIN_PATH" learn ingest --repo . --feedback "$OCR_LEARNINGS_FEEDBACK"
