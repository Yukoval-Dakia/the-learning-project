# YUK-141 [M3]: dependency automation. Dependabot opens grouped weekly PRs so
# patch/minor drift (the bulk of the audit's "outdated deps" findings) stays
# small and reviewable instead of accumulating. The npm ecosystem reads the
# pnpm-lock.yaml at the repo root. Owner action: this is an ongoing ops policy
# (a steady trickle of dependency PRs to triage/merge) — see the security audit
# 2026-05-28 recommendation #13.
version: 2
updates:
  # Application + tooling dependencies (package.json / pnpm-lock.yaml).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    # Group low-risk updates so we get a handful of batched PRs rather than one
    # PR per package. Split prod vs dev so a noisy dev-tool bump never blocks a
    # runtime-dependency review (and vice versa). Majors are deliberately left
    # ungrouped so each breaking bump gets its own reviewable PR.
    groups:
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
      dev-minor-patch:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # drizzle-zod 0.8.x is deliberately pinned to ^0.7.1 — 0.8.3 breaks the
      # generated types (owner-verified revert; see project dep-constraints).
      # Without this, the un-mergeable drizzle-zod bump poisons the whole
      # prod-minor-patch group PR (e.g. #423 blocked ~17 otherwise-safe bumps).
      # Revisit when drizzle-zod's >=0.8 type regression is resolved upstream.
      - dependency-name: "drizzle-zod"
        versions: [">=0.8.0"]
      # mem0ai >=3.1.0 makes the OSS entry point dynamically import the
      # optional @huggingface/transformers package. Our server/worker bundles
      # do not ship that local-embedder dependency, so the bump poisons the
      # whole production group at build time. Revisit when mem0 makes the
      # optional import bundle-safe (YUK-671).
      - dependency-name: "mem0ai"
        versions: [">=3.1.0"]
      # lucide-react 1.x is a breaking icon/API migration and needs explicit
      # import plus visual/a11y regression coverage. Track that migration in
      # YUK-684 instead of letting a major occupy the weekly update queue.
      - dependency-name: "lucide-react"
        update-types: ["version-update:semver-major"]
      # Biome 2.x rejects the current 1.x config keys and changes lint policy.
      # YUK-685 owns the controlled config/rule migration; keep routine dev
      # dependency updates flowing until that work is complete.
      - dependency-name: "@biomejs/biome"
        update-types: ["version-update:semver-major"]
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"

  # GitHub Actions used by .github/workflows/*.yml. Low volume, weekly.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
